name: Publish to npm

# Publishes `@savantoai/mcp-server` to npmjs.org with sigstore provenance
# via npm Trusted Publishing (OIDC). No long-lived `NPM_TOKEN` secret —
# auth is via the short-lived GitHub Actions OIDC token, which the npm
# registry verifies against the Trusted Publisher config on the package.
#
# This repo is a PUBLIC mirror of the savanto monorepo's `sdks/mcp`. It is
# public because npm provenance (sigstore) refuses to verify a bundle whose
# source repository is private. Releases are cut from the monorepo via
# `scripts/release-mcp.sh`, which snapshots `sdks/mcp/` here, bumps the
# version, and pushes a `v<x.y.z>` tag that triggers this workflow.
#
# To configure the Trusted Publisher (one-time, npm UI only):
#   1. https://www.npmjs.com/package/@savantoai/mcp-server/access
#      (for a brand-new package, configure it under the org's trusted
#       publishers before the first publish, or do one manual publish first)
#   2. "Trusted Publisher" → "Add publisher"
#   3. Provider: GitHub Actions
#      Org/user: SavantoAI
#      Repo:     mcp-server
#      Workflow filename: publish.yml
#      Environment: (leave blank — this workflow does not use one)
#
# Trigger modes:
#   1. Tag push: `v0.1.1`, `v0.2.0`, etc. — publishes the tagged version.
#      Tag must match `version` field in package.json. Versions containing
#      a dash (e.g. `0.2.0-preview.1`) publish under the `preview` dist-tag;
#      stable versions publish to `latest`.
#   2. Manual run (`workflow_dispatch`):
#        - dry_run=true (default): runs full pipeline + `npm publish --dry-run`
#        - dry_run=false: runs full pipeline + actual `npm publish`
#
# Requires:
#   - `permissions.id-token: write` (set below) so the runner can mint
#     the OIDC token npm needs.
#   - npm CLI >= 11.5.1. Trusted Publishing fails with a misleading
#     `404 Not Found` on older clients (npm/cli#9088). Node 24 ships
#     with npm 11.6.x, so pinning `node-version: '24'` below satisfies this.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + pack without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    name: Publish @savantoai/mcp-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@savantoai'

      - name: Verify package.json version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Git tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Pack tarball (sanity check)
        run: npm pack --dry-run

      - name: Determine dist-tag
        id: disttag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" == *-* ]]; then
            echo "tag=preview" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved dist-tag: $(grep '^tag=' "$GITHUB_OUTPUT" | cut -d= -f2)"

      # No `NODE_AUTH_TOKEN` env on the publish steps — Trusted Publishing
      # uses the OIDC token the runner mints from `id-token: write`. Setting
      # `NODE_AUTH_TOKEN` (even to a literal placeholder via setup-node) can
      # break the OIDC handshake — see actions/setup-node#1440.
      - name: Publish to npmjs (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: npm publish --provenance --access public --dry-run --tag ${{ steps.disttag.outputs.tag }}

      - name: Publish to npmjs
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        run: npm publish --provenance --access public --tag ${{ steps.disttag.outputs.tag }}
