name: Publish to npm

# Publishes `@savantoai/mcp-server` to npmjs.org with sigstore provenance.
#
# This repo is a PUBLIC mirror of the savanto monorepo's `sdks/mcp`. It is
# public because npm provenance (sigstore) refuses to verify a bundle whose
# source repository is private. Releases are cut from the monorepo via
# `scripts/release-mcp.sh`, which snapshots `sdks/mcp/` here, bumps the
# version, and pushes a `v<x.y.z>` tag that triggers this workflow.
#
# Auth: a token (`NPM_TOKEN` repo secret) + `--provenance`. Provenance works
# here because the source repo is public and `id-token: write` is granted —
# the same flag failed from the private monorepo, which is why this mirror
# exists. (Provenance ≠ Trusted Publishing: provenance just needs a public
# repo + OIDC permission; it works fine with token auth.)
#
# Future hardening — migrate to tokenless Trusted Publishing (OIDC), like
# @savantoai/ai-sdk:
#   npm cannot CREATE a new package via OIDC (npm/cli#8544) — the first
#   publish must use a token, which is what this workflow does. Once
#   `@savantoai/mcp-server` exists on the registry:
#     1. https://www.npmjs.com/package/@savantoai/mcp-server/access
#     2. "Trusted Publisher" → "Add publisher":
#          Provider: GitHub Actions / Org: SavantoAI / Repo: mcp-server
#          Workflow filename: publish.yml / Environment: (blank)
#     3. Drop the `NODE_AUTH_TOKEN` env below (it can break the OIDC
#        handshake — actions/setup-node#1440), then delete the NPM_TOKEN
#        secret. Subsequent releases auth via OIDC alone.
#
# Trigger modes:
#   1. Tag push: `v0.1.1`, `v0.2.0`, etc. — publishes the tagged version.
#      Tag must match `version` field in package.json. Versions containing
#      a dash (e.g. `0.2.0-preview.1`) publish under the `preview` dist-tag;
#      stable versions publish to `latest`.
#   2. Manual run (`workflow_dispatch`):
#        - dry_run=true (default): runs full pipeline + `npm publish --dry-run`
#        - dry_run=false: runs full pipeline + actual `npm publish`
#
# Requires:
#   - `NPM_TOKEN` repo secret (an npm Automation or Granular token whose
#     identity can publish in the `@savantoai` scope).
#   - `permissions.id-token: write` (set below) so npm can attach provenance.
#   - npm CLI >= 11.5.1 for provenance. Node 24 ships npm 11.6.x, so pinning
#     `node-version: '24'` below satisfies this.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build + pack without publishing'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  publish:
    name: Publish @savantoai/mcp-server
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@savantoai'

      - name: Verify package.json version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version: $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Git tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm install --include=optional --no-audit --no-fund

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Pack tarball (sanity check)
        run: npm pack --dry-run

      - name: Determine dist-tag
        id: disttag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_VERSION" == *-* ]]; then
            echo "tag=preview" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Resolved dist-tag: $(grep '^tag=' "$GITHUB_OUTPUT" | cut -d= -f2)"

      - name: Publish to npmjs (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --dry-run --tag ${{ steps.disttag.outputs.tag }}

      - name: Publish to npmjs
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public --tag ${{ steps.disttag.outputs.tag }}
